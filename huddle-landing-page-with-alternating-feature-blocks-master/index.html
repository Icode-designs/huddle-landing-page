<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="https://fonts.google.com/specimen/Poppins" />
    <link rel="stylesheet" href="https://fonts.google.com/specimen/Open+Sans" />
    <link rel="stylesheet" href="style.css" />

    <title>
      Frontend Mentor | Huddle landing page with alternating feature blocks
    </title>
  </head>
  <body>
    <header class="header">
      <nav class="nav">
        <img src="images/logo.svg" alt="nav__logo" class="nav__logo" />

        <a href="#" class="nav__try-btn">Try It Free</a>
      </nav>
      <div class="header__content">
        <article class="content__article">
          <h1 class="article__heading">
            Build The Community Your Fans Will Love
          </h1>
          <p class="article__body">
            Huddle re-imagines the way we build communities. You have a voice,
            but so does your audience. Create connections with your users as you
            engage in genuine discussion.
          </p>
          <a href="#" class="article__try-btn">Get Started For Free</a>
        </article>

        <div class="header__img-container">
          <img
            src="images/illustration-mockups.svg"
            alt="header__image"
            class="header__image"
          />
        </div>
      </div>
    </header>
  </body>
</html>
